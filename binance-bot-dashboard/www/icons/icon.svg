<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Background -->
    <rect width="512" height="512" rx="80" fill="#0b0e11"/>

    <!-- Binance-style diamond pattern -->
    <g fill="#f0b90b">
        <!-- Center diamond -->
        <polygon points="256,160 296,200 256,240 216,200"/>

        <!-- Top -->
        <polygon points="256,100 316,160 296,180 256,140 216,180 196,160"/>

        <!-- Bottom -->
        <polygon points="256,412 196,352 216,332 256,372 296,332 316,352"/>

        <!-- Left -->
        <polygon points="144,256 184,216 204,236 164,276 204,316 184,336"/>

        <!-- Right -->
        <polygon points="368,256 328,296 308,276 348,236 308,196 328,176"/>

        <!-- Center horizontal bar -->
        <polygon points="256,256 204,308 184,288 236,236 184,184 204,164 256,216 308,164 328,184 276,236 328,288 308,308"/>
    </g>

    <!-- Grid lines overlay -->
    <g stroke="#f0b90b" stroke-width="2" fill="none" opacity="0.3">
        <line x1="100" y1="380" x2="412" y2="380"/>
        <line x1="100" y1="340" x2="412" y2="340"/>
        <line x1="100" y1="420" x2="412" y2="420"/>
    </g>

    <!-- Chart bars -->
    <g fill="#f0b90b" opacity="0.8">
        <rect x="120" y="360" width="30" height="60" rx="4"/>
        <rect x="160" y="340" width="30" height="80" rx="4"/>
        <rect x="200" y="320" width="30" height="100" rx="4"/>
        <rect x="240" y="300" width="30" height="120" rx="4"/>
        <rect x="280" y="330" width="30" height="90" rx="4"/>
        <rect x="320" y="310" width="30" height="110" rx="4"/>
        <rect x="360" y="290" width="30" height="130" rx="4"/>
    </g>
</svg>
